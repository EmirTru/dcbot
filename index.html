<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Kontrol Paneli</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #23272a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel-container { background-color: #2c2f33; padding: 30px; border-radius: 12px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        h2 { color: #5865F2; margin-top: 0; margin-bottom: 5px; }
        .desc { color: #b9bbbe; font-size: 13px; margin-bottom: 20px; }
        label { display: block; text-align: left; font-size: 11px; color: #b9bbbe; margin-top: 12px; font-weight: bold; letter-spacing: 0.5px; }
        input, button { width: 100%; padding: 12px; margin: 6px 0 12px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input { background-color: #202225; color: white; font-size: 14px; }
        input:focus { outline: 2px solid #5865F2; }
        button { background-color: #5865F2; color: white; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px; }
        button:hover { background-color: #4752C4; }
        button:active { transform: scale(0.98); }
        #durum { font-weight: bold; font-size: 13px; margin-top: 8px; min-height: 18px; }
    </style>
</head>
<body>

<div class="panel-container">
    <h2>Bot Yönetim Paneli 🚀</h2>
    <div class="desc">Girdiğiniz ID bilgileri tarayıcınıza kaydedilir.</div>
    
    <label>SUNUCU (GUILD) ID</label>
    <input type="text" id="sunucuID" placeholder="Sunucu ID'sini yazın...">

    <label>KANAL (CHANNEL) ID</label>
    <input type="text" id="kanalID" placeholder="Mesajın gideceği kanal ID'si...">

    <label>GÖNDERİLECEK MESAJ</label>
    <input type="text" id="mesajIcerik" placeholder="Discord'a iletilecek metin...">
    
    <button onclick="mesajiUcur()">Discord'a Gönder 💬</button>
    <div id="durum"></div>
</div>

<script>
    // Sayfa yüklendiğinde hafızadaki eski kayıtları çek
    window.addEventListener('DOMContentLoaded', () => {
        const hafizaSunucu = localStorage.getItem('kayitliSunucu');
        const hafizaKanal = localStorage.getItem('kayitliKanal');

        // Yoksa senin verdiğin sunucu ID'sini basar
        document.getElementById('sunucuID').value = hafizaSunucu || "1483196142127677641";
        if (hafizaKanal) {
            document.getElementById('kanalID').value = hafizaKanal;
        }
    });

    async function mesajiUcur() {
        const sunucu = document.getElementById('sunucuID').value.trim();
        const kanal = document.getElementById('kanalID').value.trim();
        const mesaj = document.getElementById('mesajIcerik').value.trim();
        const durumText = document.getElementById('durum');

        if (!sunucu || !kanal || !mesaj) {
            durumText.style.color = "#eded38";
            durumText.innerText = "Lütfen boş alan bırakmayın! ⚠️";
            return;
        }

        durumText.style.color = "#b9bbbe";
        durumText.innerText = "Veri gönderiliyor... ⏳";

        // Bir sonraki sefere kolaylık olsun diye ID'leri kaydet
        localStorage.setItem('kayitliSunucu', sunucu);
        localStorage.setItem('kayitliKanal', kanal);

        const fbURL = "https://emirdiscordbotyonetim20266-default-rtdb.firebaseio.com/mesajlar.json";

        try {
            const response = await fetch(fbURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sunucuID: sunucu,
                    kanalID: kanal,
                    mesaj: mesaj,
                    zaman: Date.now()
                })
            });

            if (response.ok) {
                durumText.style.color = "#43b581";
                durumText.innerText = "Mesaj Firebase'e iletildi! ✅";
                document.getElementById('mesajIcerik').value = ""; // Sadece mesaj alanını sıfırla
            } else {
                throw new Error("Yazma hatası");
            }
        } catch (hata) {
            durumText.style.color = "#f04747";
            durumText.innerText = "Hata: Firebase'e yazılamadı! ❌";
        }
    }
</script>

</body>
</html>
