<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Paneli</title>
    <style>
        body { font-family: sans-serif; background-color: #23272a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #2c2f33; padding: 30px; border-radius: 12px; text-align: center; width: 100%; max-width: 400px; }
        h2 { color: #5865F2; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input { background-color: #202225; color: white; }
        button { background-color: #5865F2; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #4752C4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Discord Bot Paneli 🚀</h2>
    <input type="text" id="kanalID" placeholder="Kanal ID girin">
    <input type="text" id="mesaj" placeholder="Mesajınızı yazın...">
    <button onclick="firebaseYaz()">Discord'a Gönder 💬</button>
    <div id="status" style="margin-top: 15px; font-weight: bold;"></div>
</div>

<script>
    async function firebaseYaz() {
        const kanalID = document.getElementById('kanalID').value;
        const mesaj = document.getElementById('mesaj').value;
        const status = document.getElementById('status');

        if(!kanalID || !mesaj) {
            status.innerText = "Boş alan bırakma! ⚠️";
            return;
        }

        status.innerText = "Gönderiliyor... ⏳";

        // Senin sağladığın Firebase URL'i entegre edildi:
        const firebaseURL = "https://emirdiscordbotyonetim20266-default-rtdb.firebaseio.com/mesajlar.json";

        try {
            await fetch(firebaseURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ kanalID, mesaj, tarih: Date.now() })
            });
            status.innerText = "Mesaj iletildi! Bot açık ise sunucuya gönderilecek. ✅";
            document.getElementById('mesaj').value = ""; // Kutuyu temizle
        } catch (err) {
            status.innerText = "Firebase bağlantı hatası! ❌";
        }
    }
</script>

</body>
</html>
