<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord</title>
    <style>
        :root {
            --bg-darkest: #1e1f22;
            --bg-sidebar: #2b2d31;
            --bg-main: #313338;
            --bg-input: #383a40;
            --text-main: #dbdee1;
            --text-muted: #949ba4;
            --blurple: #5865f2;
            --blurple-hover: #4752c4;
            --green: #23a55a;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-darkest); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; select: none; }
        
        /* En Sol: Sunucu İkonları Listesi */
        .guilds-sidebar { width: 72px; background-color: var(--bg-darkest); display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; border-right: 1px solid rgba(0,0,0,0.2); }
        .guild-icon { width: 48px; height: 48px; background-color: var(--bg-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; cursor: pointer; transition: border-radius 0.2s, background-color: 0.2s; font-size: 14px; position: relative; }
        .guild-icon:hover, .guild-icon.active { border-radius: 16px; background-color: var(--blurple); }
        .guild-icon::before { content: ''; position: absolute; left: -12px; width: 8px; height: 20px; background-color: white; border-radius: 0 4px 4px 0; display: none; }
        .guild-icon.active::before { display: block; height: 40px; left: -12px; }

        /* Sol Orta: Kanallar ve Kişiler */
        .channels-sidebar { width: 240px; background-color: var(--bg-sidebar); display: flex; flex-direction: column; justify-content: space-between; }
        .channels-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; font-weight: bold; font-size: 15px; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .channels-list { padding: 8px; flex-grow: 1; overflow-y: auto; }
        .category-title { font-size: 12px; font-weight: bold; color: var(--text-muted); padding: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .channel-item { display: flex; align-items: center; padding: 6px 8px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; color: var(--text-muted); font-size: 14px; }
        .channel-item:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
        .channel-item.active { background-color: rgba(255,255,255,0.1); color: white; }
        .channel-item span { margin-right: 6px; font-size: 16px; font-weight: bold; }

        /* Sol Alt: Bot Profil Alanı */
        .user-footer { height: 52px; background-color: #232428; display: flex; align-items: center; padding: 0 8px; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar-container { position: relative; width: 32px; height: 32px; }
        .user-avatar { width: 32px; height: 32px; background-color: var(--blurple); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 12px; color: white; }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 10px; height: 10px; background-color: var(--green); border-radius: 50%; border: 2px solid #232428; }
        .user-details { display: flex; flex-direction: column; font-size: 13px; }
        .username { font-weight: bold; color: white; line-height: 14px; }
        .user-tag { color: var(--text-muted); font-size: 11px; }

        /* Sağ Alan: Ana Sohbet Ekranı */
        .chat-area { flex-grow: 1; background-color: var(--bg-main); display: flex; flex-direction: column; }
        .chat-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; font-weight: bold; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); gap: 8px; }
        .chat-header .hash { color: var(--text-muted); font-size: 20px; }
        
        /* Mesaj Geçmişi Görünümü (Simüle Edilmiş) */
        .chat-messages { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; }
        .message-row { display: flex; gap: 16px; }
        .msg-avatar { width: 40px; height: 40px; background-color: #4f545c; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; }
        .msg-content { display: flex; flex-direction: column; }
        .msg-author { font-weight: bold; font-size: 15px; color: white; margin-bottom: 4px; }
        .msg-text { font-size: 15px; color: var(--text-main); }

        /* Mesaj Yazma Alanı (Gönderim Formu) */
        .chat-input-area { padding: 0 16px 24px 16px; background-color: var(--bg-main); }
        .input-wrapper { background-color: var(--bg-input); border-radius: 8px; display: flex; align-items: center; padding: 0 16px; height: 44px; }
        .input-wrapper input { background: none; border: none; color: var(--text-main); width: 100%; height: 100%; font-size: 15px; outline: none; }
        .input-wrapper button { background-color: var(--blurple); color: white; border: none; padding: 6px 14px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .input-wrapper button:hover { background-color: var(--blurple-hover); }
        
        #status-log { font-size: 12px; color: var(--text-muted); margin-top: 5px; padding-left: 5px; }
    </style>
</head>
<body>

    <!-- 1. EN SOL: SUNUCULAR -->
    <div class="guilds-sidebar">
        <div class="guild-icon active" title="Varsayılan Sunucu" onclick="selectGuild('1483196142127677641', 'DDoors Spoilers')">DS</div>
        <div class="guild-icon" title="Test Sunucusu" onclick="selectGuild('999999999999999999', 'Geliştirici Sunucusu')">GS</div>
    </div>

    <!-- 2. SOL ORTA: KANALLAR VE BOT PROFİLİ -->
    <div class="channels-sidebar">
        <div>
            <div class="channels-header" id="guild-name">DDoors Spoilers</div>
            <div class="channels-list">
                <div class="category-title">Yazı Kanalları</div>
                <div class="channel-item active" onclick="selectChannel('123456789012345678', 'genel')"><span>#</span>genel</div>
                <div class="channel-item" onclick="selectChannel('888888888888888888', 'spoiler-odasi')"><span>#</span>spoiler-odasi</div>
                <div class="channel-item" onclick="selectChannel('777777777777777777', 'bot-komut')"><span>#</span>bot-komut</div>
            </div>
        </div>
        
        <!-- Bot Kimliği -->
        <div class="user-footer">
            <div class="user-info">
                <div class="avatar-container">
                    <div class="user-avatar">BOT</div>
                    <div class="status-dot"></div>
                </div>
                <div class="user-details">
                    <span class="username">DoorsBot</span>
                    <span class="user-tag">#0001</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. SAĞ ALAN: SOHBET VE GÖNDERME PANELİ -->
    <div class="chat-area">
        <div class="chat-header">
            <span class="hash">#</span>
            <span id="current-channel-name">genel</span>
        </div>

        <!-- Sahte Geçmiş (Arayüz Tamamlansın Diye) -->
        <div class="chat-messages">
            <div class="message-row">
                <div class="msg-avatar">U</div>
                <div class="msg-content">
                    <span class="msg-author">Sistem</span>
                    <span class="msg-text">Panel bağlantısı kuruldu. Mesajınızı aşağıdaki kutudan gönderebilirsiniz.</span>
                </div>
            </div>
        </div>

        <!-- Giriş Kutusu -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="mesajKutusu" placeholder="#genel kanalına mesaj gönder...">
                <button onclick="discordaUcur()">Gönder</button>
            </div>
            <div id="status-log">Seçili Sunucu: <b id="lbl-sunucu">1483196142127677641</b> | Kanal: <b id="lbl-kanal">123456789012345678</b></div>
        </div>
    </div>

<script>
    // Aktif durumdaki ID'leri tutan değişkenler
    let aktifSunucuID = "1483196142127677641";
    let aktifKanalID = "123456789012345678";

    // Sayfa açıldığında hafızadaki en son seçilen kanalı getir
    window.addEventListener('DOMContentLoaded', () => {
        const localKanal = localStorage.getItem('lastKanalID');
        if (localKanal) {
            aktifKanalID = localKanal;
            document.getElementById('lbl-kanal').innerText = localKanal;
        }
    });

    function selectGuild(id, name) {
        aktifSunucuID = id;
        document.getElementById('guild-name').innerText = name;
        document.getElementById('lbl-sunucu').innerText = id;
        
        // Görsel efekt aktifleştirme
        document.querySelectorAll('.guild-icon').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function selectChannel(id, name) {
        aktifKanalID = id;
        document.getElementById('current-channel-name').innerText = name;
        document.getElementById('lbl-kanal').innerText = id;
        document.getElementById('mesajKutusu').placeholder = `#${name} kanalına mesaj gönder...`;
        localStorage.setItem('lastKanalID', id);

        // Görsel efekt aktifleştirme
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    async function discordaUcur() {
        const mesaj = document.getElementById('mesajKutusu').value.trim();
        const log = document.getElementById('status-log');

        if (!mesaj) return;

        log.innerText = "Mesaj Firebase'e iletiliyor... ⏳";

        const fbURL = "https://emirdiscordbotyonetim20266-default-rtdb.firebaseio.com/mesajlar.json";

        try {
            const res = await fetch(fbURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sunucuID: aktifSunucuID,
                    kanalID: aktifKanalID,
                    mesaj: mesaj,
                    zaman: Date.now()
                })
            });

            if (res.ok) {
                log.innerHTML = `✅ Mesaj başarıyla sıraya eklendi! Sunucu: <b>${aktifSunucuID}</b>`;
                document.getElementById('mesajKutusu').value = ""; // Kutuyu temizle
            } else {
                throw new Error();
            }
        } catch (e) {
            log.innerHTML = "<span style='color:#f04747;'>❌ Firebase bağlantı hatası oluştu!</span>";
        }
    }

    // Enter tuşuna basınca da göndersin
    document.getElementById('mesajKutusu').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') discordaUcur();
    });
</script>

</body>
</html>
